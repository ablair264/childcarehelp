              "acceptedAnswer": {
                "@type": "Answer",
                "text": "To qualify for 30 hours free childcare, both parents (or the sole parent in a single-parent household) must be working at least 16 hours per week at the National Minimum Wage or Living Wage, and each must earn less than £100,000 per year. This applies to children from 9 months old until they start school."

              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes! You can combine Tax-Free Childcare with the 15 or 30 hours free childcare entitlement. However, you cannot use Tax-Free Childcare if you are receiving Universal Credit childcare support or Tax Credits. It is worth calculating which option gives you the most support."
              }
            },
            {
              "@type": "Question",
              "name": "When can I start using my free hours?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Your child becomes eligible the term after they reach the qualifying age. For example, if your child turns 3 in February, they can start from the April term. The cut-off dates are: 31st March (Summer term), 31st August (Autumn term), and 31st December (Spring term)."
              }
            },
            {
              "@type": "Question",
              "name": "What does the funding cover?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Government funding covers the cost of childcare hours only. It typically does not include meals, nappies, additional activities like trips, or extra hours beyond your entitlement. However, these charges must not be mandatory – speak to your provider about alternatives."
              }
            },
            {
              "@type": "Question",
              "name": "How do I apply for Tax-Free Childcare?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "You can apply online through the government website. You will need to create an online childcare account, and for every £8 you pay in, the government will add £2. You can get up to £500 every 3 months (£2,000 per year) for each child."
              }
            },
            {
              "@type": "Question",
              "name": "What if I am on Universal Credit?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "If you are on Universal Credit, you can claim back up to 85% of your childcare costs – up to £1,031.88 per month for one child or £1,768.94 for two or more children. You cannot use Tax-Free Childcare at the same time, so calculate which gives you more support."
              }

              "name": "Do I need to reconfirm my eligibility?",
              "acceptedAnswer": {
